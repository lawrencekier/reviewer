<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ITELECTV 4 (SAM): 100-Item Reviewer</title>
    <style>
        :root {
            --primary: #3b82f6;
            --primary-hover: #2563eb;
            --success: #16a34a;
            --success-bg: #dcfce7;
            --error: #dc2626;
            --error-bg: #fee2e2;
            --bg: #f1f5f9;
            --card-bg: #ffffff;
            --text-main: #0f172a;
            --text-muted: #64748b;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
            background-color: var(--bg);
            color: var(--text-main);
            display: flex;
            justify-content: center;
            padding: 20px;
            line-height: 1.6;
        }

        .container {
            width: 100%;
            max-width: 850px;
            background: var(--card-bg);
            padding: 30px;
            border-radius: 12px;
            box-shadow: 0 10px 25px -5px rgba(0,0,0,0.1);
        }

        h1, h2 { text-align: center; color: var(--primary); margin-bottom: 10px; }
        .subtitle { text-align: center; color: var(--text-muted); margin-bottom: 25px; }

        .hidden { display: none !important; }

        .menu-grid {
            display: grid;
            grid-template-columns: 1fr;
            gap: 15px;
        }

        .btn {
            padding: 16px 20px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            border: none;
            border-radius: 8px;
            transition: all 0.2s ease;
            background: var(--primary);
            color: white;
            text-align: left;
            display: flex;
            justify-content: space-between;
        }

        .btn:hover { background: var(--primary-hover); transform: translateY(-2px); }
        
        .btn-center { text-align: center; justify-content: center; }
        .btn-secondary { background: var(--text-muted); }
        .btn-secondary:hover { background: #475569; }

        .progress-container {
            width: 100%;
            height: 10px;
            background: #e2e8f0;
            border-radius: 5px;
            margin-bottom: 20px;
            overflow: hidden;
        }

        .progress-bar {
            height: 100%;
            background: var(--primary);
            width: 0%;
            transition: width 0.3s ease;
        }

        .stats {
            display: flex;
            justify-content: space-between;
            font-weight: 600;
            color: var(--text-muted);
            margin-bottom: 20px;
            padding-bottom: 15px;
            border-bottom: 2px solid #e2e8f0;
        }

        .question-text {
            font-size: 1.25rem;
            margin-bottom: 25px;
            font-weight: 600;
            line-height: 1.5;
        }

        .option-btn {
            display: block;
            width: 100%;
            text-align: left;
            background: #f8fafc;
            color: var(--text-main);
            border: 2px solid transparent;
            margin-bottom: 12px;
            padding: 14px 20px;
            font-size: 16px;
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.2s ease;
        }

        .option-btn:hover:not(:disabled) { background: #e2e8f0; }
        .option-btn:disabled { cursor: default; }

        .option-btn.correct { 
            background: var(--success-bg) !important; 
            border-color: var(--success); 
            color: #14532d; 
        }
        
        .option-btn.wrong { 
            background: var(--error-bg) !important; 
            border-color: var(--error); 
            color: #7f1d1d; 
        }

        .feedback {
            margin: 20px 0;
            padding: 15px;
            border-radius: 8px;
            text-align: center;
            font-weight: bold;
            font-size: 1.1rem;
            animation: fadeIn 0.3s ease;
        }

        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

        .nav-controls {
            display: flex;
            justify-content: space-between;
            margin-top: 25px;
            gap: 15px;
        }

        .score-display {
            text-align: center;
            font-size: 4rem;
            font-weight: bold;
            color: var(--primary);
            margin: 20px 0;
        }
        
        .score-total { font-size: 2rem; color: var(--text-muted); }

        /* Mobile Responsiveness */
        @media (max-width: 600px) {
            body { padding: 10px; }
            .container { padding: 20px 15px; }
            h1 { font-size: 1.5rem; }
            h2 { font-size: 1.25rem; }
            .subtitle { font-size: 0.95rem; }
            .btn { font-size: 15px; padding: 14px 15px; }
            .question-text { font-size: 1.15rem; }
            .option-btn { font-size: 15px; padding: 12px 15px; }
            .nav-controls { flex-direction: column-reverse; }
            .nav-controls button { width: 100%; justify-content: center; text-align: center;}
            .score-display { font-size: 3rem; }
        }
    </style>
</head>

<div class="container">
    <div id="menu-screen">

        <div id="feedback" class="feedback hidden"></div>
        
        <div class="nav-controls">
            <button class="btn btn-secondary btn-center" onclick="showMenu()">Exit Module</button>
            <button id="next-btn" class="btn btn-center hidden" onclick="nextQuestion()">Next Question &rarr;</button>

    <div id="results-screen" class="hidden">

        <div class="score-display">

        <p id="result-message" style="text-align: center; font-size: 1.2rem; margin-bottom: 30px; font-weight: bold;"></p>
        <div class="menu-grid">
            <button class="btn btn-center" onclick="retryQuiz()">Retry Module</button>
            <button class="btn btn-secondary btn-center" onclick="showMenu()">Back to Main Menu</button>
        </div>
    </div>
</div>

    let hasAnswered = false;

    // DOM Elements
    const menuScreen = document.getElementById('menu-screen');
    const quizScreen = document.getElementById('quiz-screen');
    const resultsScreen = document.getElementById('results-screen');
    const moduleMenu = document.getElementById('module-menu');

    // Initialization
    function initMenu() {
        quizData.forEach((module, index) => {
            const btn = document.createElement('button');
            btn.className = 'btn';
            btn.innerHTML = `<span>${module.title}</span> <span>(${module.questions.length} Items)</span>`;
            btn.onclick = () => startQuiz(index);
            moduleMenu.appendChild(btn);
        });
    }

    function showMenu() {
        menuScreen.classList.remove('hidden');
        quizScreen.classList.add('hidden');
        resultsScreen.classList.add('hidden');
    }

    function startQuiz(index) {
        currentModuleIndex = index;
        currentQuestionIndex = 0;
        score = 0;
        
        menuScreen.classList.add('hidden');
        resultsScreen.classList.add('hidden');
        quizScreen.classList.remove('hidden');
        
        loadQuestion();
    }

    function loadQuestion() {
        hasAnswered = false;
        const module = quizData[currentModuleIndex];
        const qData = module.questions[currentQuestionIndex];
        const totalQ = module.questions.length;
        
        document.getElementById('module-title').innerText = module.title;
        document.getElementById('q-current').innerText = currentQuestionIndex + 1;
        document.getElementById('q-total').innerText = totalQ;
        document.getElementById('current-score').innerText = score;
        
        const progress = (currentQuestionIndex / totalQ) * 100;
        document.getElementById('progress-bar').style.width = `${progress}%`;

        document.getElementById('question-text').innerText = `${currentQuestionIndex + 1}. ${qData.q}`;
        
        const container = document.getElementById('options-container');
        container.innerHTML = '';
        
        // Shuffle options for variation
        const shuffledOptions = [...qData.options].sort(() => Math.random() - 0.5);

        shuffledOptions.forEach(opt => {
            const btn = document.createElement('button');
            btn.className = 'option-btn';
            btn.innerText = opt;
            btn.onclick = () => checkAnswer(btn, opt, qData.a);
            container.appendChild(btn);
        });

        document.getElementById('feedback').className = 'feedback hidden';
        document.getElementById('next-btn').classList.add('hidden');
    }

    function checkAnswer(btn, selected, correct) {
        if (hasAnswered) return;
        hasAnswered = true;

        const feedback = document.getElementById('feedback');
        feedback.classList.remove('hidden');

        // Reveal the correct option and disable buttons
        const allButtons = document.querySelectorAll('.option-btn');
        allButtons.forEach(b => {
            b.disabled = true;
            if (b.innerText === correct) {
                b.classList.add('correct');
            }
        });

        // Determine correctness
        if (selected === correct) {
            score++;
            document.getElementById('current-score').innerText = score;
            feedback.innerText = "✅ Correct!";
            feedback.style.backgroundColor = "var(--success-bg)";
            feedback.style.color = "#14532d";
        } else {
            btn.classList.add('wrong');
            feedback.innerText = `❌ Incorrect. The correct answer is highlighted above.`;
            feedback.style.backgroundColor = "var(--error-bg)";
            feedback.style.color = "#7f1d1d";
        }

        // Advance Progress Bar slightly to reflect the completed question
        const totalQ = quizData[currentModuleIndex].questions.length;
        const progress = ((currentQuestionIndex + 1) / totalQ) * 100;
        document.getElementById('progress-bar').style.width = `${progress}%`;

        // Update "Next" button text
        const nextBtn = document.getElementById('next-btn');
        if (currentQuestionIndex === (totalQ - 1)) {
            nextBtn.innerHTML = "Finish Module &rarr;";
        } else {
            nextBtn.innerHTML = "Next Question &rarr;";
        }
        nextBtn.classList.remove('hidden');
    }

    function nextQuestion() {
        const totalQ = quizData[currentModuleIndex].questions.length;
        if (currentQuestionIndex < (totalQ - 1)) {
            currentQuestionIndex++;
            loadQuestion();
        } else {
            showResults();
        }
    }

    function showResults() {
        quizScreen.classList.add('hidden');
        resultsScreen.classList.remove('hidden');
        
        const totalQ = quizData[currentModuleIndex].questions.length;
        document.getElementById('final-score').innerText = score;
        document.getElementById('max-score').innerText = `/${totalQ}`;
        
        const percentage = (score / totalQ) * 100;
        const msgElement = document.getElementById('result-message');
        
        if (percentage >= 90) { 
            msgElement.innerText = "Outstanding! You have mastered this module."; 
            msgElement.style.color = "var(--success)"; 
        }
        else if (percentage >= 70) { 
            msgElement.innerText = "Great job! You have a solid understanding."; 
            msgElement.style.color = "var(--primary)"; 
        }
        else if (percentage >= 50) { 
            msgElement.innerText = "Good effort! A little more review is needed."; 
            msgElement.style.color = "#ca8a04"; 
        }
        else { 
            msgElement.innerText = "Keep studying! Review the module and try again."; 
            msgElement.style.color = "var(--error)"; 
        }
    }

    function retryQuiz() {
        startQuiz(currentModuleIndex);
    }

    // Initialize the application on load
    window.onload = initMenu;
</script>

</body>
</html>
