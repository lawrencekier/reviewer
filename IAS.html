<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>IAS321: Information Assurance and Security 1 Reviewer</title>
    <style>
        :root {
            --primary: #1e3a8a;
            --accent: #3b82f6;
            --success: #16a34a;
            --error: #dc2626;
            --bg: #f8fafc;
            --card: #ffffff;
            --text: #1e293b;
            --muted: #64748b;
        }

        body {
            font-family: 'Segoe UI', system-ui, sans-serif;
            background-color: var(--bg);
            color: var(--text);
            margin: 0;
            padding: 20px;
            display: flex;
            justify-content: center;
        }

        .container {
            width: 100%;
            max-width: 850px;
            background: var(--card);
            padding: 30px;
            border-radius: 12px;
            box-shadow: 0 10px 15px -3px rgb(0 0 0 / 0.1);
        }

        h1, h2 { text-align: center; color: var(--primary); }
        .subtitle { text-align: center; color: var(--muted); margin-bottom: 30px; }
        
        .hidden { display: none !important; }

        .menu-grid {
            display: grid;
            grid-template-columns: 1fr;
            gap: 15px;
            margin-top: 20px;
        }

        button {
            padding: 15px 20px;
            font-size: 16px;
            font-weight: 500;
            cursor: pointer;
            border: none;
            border-radius: 8px;
            transition: all 0.2s;
            background: var(--accent);
            color: white;
            text-align: left;
        }

        .menu-grid button { text-align: center; }

        button:hover { background: #2563eb; transform: translateY(-1px); }
        .btn-secondary { background: var(--muted); text-align: center; }
        .btn-secondary:hover { background: #475569; }
        .btn-next { text-align: center; }

        .progress-container {
            width: 100%;
            height: 8px;
            background: #e2e8f0;
            border-radius: 4px;
            margin-bottom: 20px;
            overflow: hidden;
        }

        .progress-bar {
            height: 100%;
            background: var(--accent);
            width: 0%;
            transition: width 0.3s ease;
        }

        .stats {
            display: flex;
            justify-content: space-between;
            font-weight: bold;
            color: var(--muted);
            margin-bottom: 20px;
            padding-bottom: 15px;
            border-bottom: 2px solid #e2e8f0;
        }

        .question-text {
            font-size: 1.25rem;
            margin-bottom: 25px;
            font-weight: 600;
            line-height: 1.5;
        }

        .option-btn {
            display: block;
            width: 100%;
            background: #f1f5f9;
            color: var(--text);
            border: 2px solid transparent;
            margin-bottom: 12px;
        }

        .option-btn:hover:not(:disabled) { background: #e2e8f0; }
        .option-btn:disabled { cursor: default; }

        .option-btn.correct { background: #dcfce7 !important; border-color: var(--success); color: #14532d; }
        .option-btn.wrong { background: #fee2e2 !important; border-color: var(--error); color: #7f1d1d; }

        .feedback {
            margin: 20px 0;
            padding: 15px;
            border-radius: 8px;
            text-align: center;
            font-weight: bold;
            font-size: 1.1rem;
        }

        .nav-controls {
            display: flex;
            justify-content: space-between;
            margin-top: 25px;
            gap: 15px;
        }

        /* --- Mobile Responsiveness --- */
        @media (max-width: 600px) {
            body {
                padding: 10px;
            }

            .container {
                padding: 20px 15px;
                border-radius: 8px;
            }

            h1 { font-size: 1.5rem; }
            h2 { font-size: 1.25rem; }
            .subtitle { font-size: 0.9rem; margin-bottom: 20px; }

            button {
                padding: 14px 15px; /* Better touch targets for mobile */
                font-size: 15px;
            }

            .stats {
                flex-direction: column;
                align-items: center;
                gap: 8px;
                font-size: 0.95rem;
                padding-bottom: 10px;
            }

            .question-text {
                font-size: 1.1rem;
                margin-bottom: 20px;
            }

            .nav-controls {
                flex-direction: column-reverse; /* Puts "Next" button on top on mobile */
            }

            .nav-controls button {
                width: 100%;
            }
            
            #results-screen div {
                font-size: 3rem !important; /* Scale down the huge score text on mobile */
            }
        }
    </style>
</head>
<body>

<div class="container">
    <div id="menu-screen">
        <h1>IAS321: 100-Item Reviewer</h1>
        <p class="subtitle">Select a module to begin (25 Questions each)</p>
        <div class="menu-grid">
            <button onclick="startQuiz(0)">Module 1: Intro to Information Security (17 Items)</button>
            <button onclick="startQuiz(1)">Module 2: The Need for Security (17 Items)</button>
            <button onclick="startQuiz(2)">Module 3: Legal, Ethical & Professional (17 Items)</button>
            <button onclick="startQuiz(3)">Module 4: Risk Management (16 Items)</button>
            <button onclick="startQuiz(4)">Module 5: Planning for Security (16 Items)</button>
            <button onclick="startQuiz(5)">Module 6: Firewalls and VPNs (17 Items)</button>
        </div>
    </div>

    <div id="quiz-screen" class="hidden">
        <h2 id="module-title">Module Title</h2>
        <div class="progress-container"><div id="progress-bar" class="progress-bar"></div></div>
        <div class="stats">
            <span>Question <span id="q-current">1</span> of <span id="q-total">17</span></span>
            <span>Score: <span id="current-score">0</span></span>
        </div>
        
        <div id="question-text" class="question-text"></div>
        <div id="options-container"></div>
        <div id="feedback" class="feedback hidden"></div>
        
        <div class="nav-controls">
            <button class="btn-secondary" onclick="showMenu()">Exit to Menu</button>
            <button id="next-btn" class="btn-next hidden" onclick="nextQuestion()">Next Question &rarr;</button>
        </div>
    </div>

    <div id="results-screen" class="hidden">
        <h2>Module Completed!</h2>
        <div style="text-align: center; font-size: 4rem; font-weight: bold; color: var(--accent); margin: 20px 0;">
            <span id="final-score">0</span><span style="font-size: 2rem; color: var(--muted)" id="max-score-display">/17</span>
        </div>
        <p id="result-message" style="text-align: center; font-size: 1.2rem; margin-bottom: 30px; font-weight: bold;"></p>
        <div class="menu-grid">
            <button onclick="retryQuiz()" style="text-align: center;">Retry Module</button>
            <button class="btn-secondary" onclick="showMenu()">Back to Main Menu</button>
        </div>
    </div>
</div>

                { q: "An ID card, ATM card, or smart token is an example of which authentication factor?", a: "Something a supplicant has", options: ["Something a supplicant knows", "Something a supplicant has", "Something a supplicant is", "Something a supplicant does"] },
                { q: "Biometrics like fingerprints, retina scans, and voice patterns represent which authentication factor?", a: "Something a supplicant is", options: ["Something a supplicant knows", "Something a supplicant has", "Something a supplicant is", "Something a supplicant creates"] },
                { q: "The matching of an authenticated entity to a list of information assets and access levels is called:", a: "Authorization", options: ["Identification", "Authentication", "Authorization", "Accountability"] },
                { q: "Ensuring that all actions on a system can be attributed to an authenticated identity via logs is called:", a: "Accountability", options: ["Authorization", "Accountability", "Identification", "Authentication"] },
                { q: "Which type of firewall examines only the header information of incoming data packets at the IP level?", a: "Packet-filtering firewall", options: ["Application gateway", "Stateful inspection firewall", "Packet-filtering firewall", "MAC layer firewall"] },
                { q: "Which type of firewall keeps track of each network connection between internal and external systems using a state table?", a: "Stateful inspection firewall", options: ["Packet-filtering firewall", "Circuit gateway", "Stateful inspection firewall", "MAC layer firewall"] },
                { q: "An application-level firewall is also known as a:", a: "Proxy server", options: ["Proxy server", "Packet router", "VPN tunnel", "State table"] },
                { q: "First-generation firewalls consisted of:", a: "Simple packet-filtering routers", options: ["Simple packet-filtering routers", "Application proxy servers", "Stateful inspection tables", "Kernel proxies"] },
                { q: "What does VPN stand for?", a: "Virtual Private Network", options: ["Visual Packet Node", "Virtual Private Network", "Verified Public Network", "Virtual Protected Node"] },
                { q: "Which VPN technology relies on leased circuits from a service provider?", a: "Trusted VPN", options: ["Secure VPN", "Hybrid VPN", "Trusted VPN", "Public VPN"] },
                { q: "In which VPN mode is the data within an IP packet encrypted, but the header information is left unencrypted?", a: "Transport Mode", options: ["Tunnel Mode", "Transport Mode", "Hybrid Mode", "Stealth Mode"] }
            ]
        }
    ];

    let currentModule = 0;
    let currentQuestion = 0;
    let score = 0;
    let answered = false;

    function showMenu() {
        document.getElementById('menu-screen').classList.remove('hidden');
        document.getElementById('quiz-screen').classList.add('hidden');
        document.getElementById('results-screen').classList.add('hidden');
    }

    function startQuiz(index) {
        currentModule = index;
        currentQuestion = 0;
        score = 0;
        
        document.getElementById('menu-screen').classList.add('hidden');
        document.getElementById('results-screen').classList.add('hidden');
        document.getElementById('quiz-screen').classList.remove('hidden');
        
        loadQuestion();
    }

    function loadQuestion() {
        answered = false;
        const module = quizData[currentModule];
        const qData = module.questions[currentQuestion];
        const totalQ = module.questions.length;
        
        document.getElementById('module-title').innerText = module.title;
        document.getElementById('q-current').innerText = currentQuestion + 1;
        document.getElementById('q-total').innerText = totalQ;
        document.getElementById('current-score').innerText = score;
        document.getElementById('max-score-display').innerText = `/${totalQ}`;
        
        // Update Progress
        const progress = (currentQuestion / totalQ) * 100;
        document.getElementById('progress-bar').style.width = `${progress}%`;

        document.getElementById('question-text').innerText = `${currentQuestion + 1}. ${qData.q}`;
        
        const container = document.getElementById('options-container');
        container.innerHTML = '';
        
        // Shuffle options
        const shuffled = [...qData.options].sort(() => Math.random() - 0.5);

        shuffled.forEach(opt => {
            const btn = document.createElement('button');
            btn.className = 'option-btn';
            btn.innerText = opt;
            btn.onclick = () => checkAnswer(btn, opt, qData.a);
            container.appendChild(btn);
        });

        document.getElementById('feedback').classList.add('hidden');
        document.getElementById('next-btn').classList.add('hidden');
    }

    function checkAnswer(btn, selected, correct) {
        if (answered) return;
        answered = true;

        const feedback = document.getElementById('feedback');
        feedback.classList.remove('hidden');

        // Highlight correct option
        const buttons = document.querySelectorAll('.option-btn');
        buttons.forEach(b => {
            b.disabled = true;
            if (b.innerText === correct) b.classList.add('correct');
        });

        if (selected === correct) {
            score++;
            document.getElementById('current-score').innerText = score;
            feedback.innerText = "✅ Correct!";
            feedback.style.backgroundColor = "#dcfce7";
            feedback.style.color = "#14532d";
        } else {
            btn.classList.add('wrong');
            feedback.innerText = `❌ Incorrect. The correct answer is highlighted above.`;
            feedback.style.backgroundColor = "#fee2e2";
            feedback.style.color = "#7f1d1d";
        }

        // Update Progress to include answered state
        const totalQ = quizData[currentModule].questions.length;
        const progress = ((currentQuestion + 1) / totalQ) * 100;
        document.getElementById('progress-bar').style.width = `${progress}%`;

        const nextBtn = document.getElementById('next-btn');
        nextBtn.innerText = currentQuestion === (totalQ - 1) ? "Finish Module &rarr;" : "Next Question &rarr;";
        nextBtn.classList.remove('hidden');
    }

    function nextQuestion() {
        const totalQ = quizData[currentModule].questions.length;
        if (currentQuestion < (totalQ - 1)) {
            currentQuestion++;
            loadQuestion();
        } else {
            showResults();
        }
    }

    function showResults() {
        document.getElementById('quiz-screen').classList.add('hidden');
        document.getElementById('results-screen').classList.remove('hidden');
        
        const totalQ = quizData[currentModule].questions.length;
        document.getElementById('final-score').innerText = score;
        
        const percentage = (score / totalQ) * 100;
        const msg = document.getElementById('result-message');
        
        if (percentage >= 90) { msg.innerText = "Outstanding! You've mastered these concepts."; msg.style.color = "var(--success)"; }
        else if (percentage >= 70) { msg.innerText = "Great job! A solid understanding."; msg.style.color = "var(--accent)"; }
        else if (percentage >= 50) { msg.innerText = "Good effort, but review the material again."; msg.style.color = "#ca8a04"; }
        else { msg.innerText = "Keep studying! You'll get it next time."; msg.style.color = "var(--error)"; }
    }

    function retryQuiz() {
        startQuiz(currentModule);
    }
</script>
