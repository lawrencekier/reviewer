<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>APP_DEV: 100-Item IT Modules Quiz Reviewer</title>
    <style>
        :root { --primary: #2563eb; --success: #22c55e; --error: #ef4444; --bg: #f8fafc; --text: #1e293b; }
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background-color: var(--bg); color: var(--text); line-height: 1.6; margin: 0; padding: 20px; display: flex; justify-content: center; }
        .container { width: 100%; max-width: 800px; background: white; padding: 30px; border-radius: 12px; box-shadow: 0 4px 6px -1px rgb(0 0 0 / 0.1); }
        h1, h2 { text-align: center; color: var(--primary); }
        .hidden { display: none !important; }
        .menu-grid { display: grid; gap: 15px; margin-top: 20px; }
        button { padding: 12px 20px; font-size: 16px; cursor: pointer; border: none; border-radius: 6px; transition: all 0.2s; background: var(--primary); color: white; }
        button:hover { opacity: 0.9; transform: translateY(-1px); }
        .option-btn { display: block; width: 100%; text-align: left; background: #f1f5f9; color: var(--text); margin-bottom: 10px; }
        .option-btn.correct { background: var(--success) !important; color: white; }
        .option-btn.wrong { background: var(--error) !important; color: white; }
        .nav-controls { display: flex; justify-content: space-between; margin-top: 20px; gap: 15px; }
        .stats { font-weight: bold; margin-bottom: 20px; text-align: center; color: #64748b;}
        #feedback { margin: 15px 0; padding: 10px; border-radius: 6px; text-align: center; font-weight: bold; }
        .progress-bar { width: 100%; height: 8px; background: #e2e8f0; border-radius: 4px; margin-bottom: 20px; overflow: hidden; }
        .progress-fill { height: 100%; background: var(--primary); width: 0%; transition: width 0.3s ease; }

        /* --- Mobile Responsiveness Adjustments --- */
        @media (max-width: 600px) {
            body {
                padding: 10px;
            }

            .container {
                padding: 20px 15px;
                border-radius: 8px;
            }

            h1 { font-size: 1.5rem; }
            h2 { font-size: 1.25rem; }

            button {
                padding: 14px 15px; /* Taller touch targets for mobile */
                font-size: 15px;
                width: 100%; /* Full width buttons on mobile */
            }

            .stats {
                display: flex;
                flex-direction: column;
                gap: 5px;
                font-size: 0.95rem;
                margin-bottom: 15px;
            }

            #question-text {
                font-size: 1.1rem !important; /* Scale down question text slightly */
                margin-bottom: 15px !important;
            }

            .nav-controls {
                flex-direction: column-reverse; /* Puts "Next" button on top for easier tapping */
            }
            
            .score-display {
                font-size: 2rem !important; /* Scale down final score display */
            }
        }
    </style>
</head>
<body>

<div class="container">
    <div id="menu-screen">
        <h1>CC326: App Development  100-Item Reviewer</h1>
       <p class="subtitle">Select a module to begin (25 Questions each)</p>
        <div class="menu-grid">
            <button onclick="startQuiz(0)">Module 1: Software & Lehman's Laws (25 Items)</button>
            <button onclick="startQuiz(1)">Module 2: Emerging Technologies (25 Items)</button>
            <button onclick="startQuiz(2)">Module 4: Cross-Platform Development (25 Items)</button>
            <button onclick="startQuiz(3)">Topic 2: SDLC & System Analysis (25 Items)</button>
        </div>
    </div>

    <div id="quiz-screen" class="hidden">
        <h2 id="module-title">Module Title</h2>
        <div class="progress-bar"><div id="progress-fill" class="progress-fill"></div></div>
        <div class="stats">
            <span>Question <span id="q-current">1</span> of <span id="q-total">25</span></span>
            <span>Current Score: <span id="running-score">0</span></span>
        </div>
        <div id="question-text" style="font-size: 1.2em; margin-bottom: 20px; font-weight: 600;"></div>
        <div id="options-container"></div>
        <div id="feedback" class="hidden"></div>
        <div class="nav-controls">
            <button onclick="showMenu()" style="background: #64748b;">Exit to Menu</button>
            <button id="next-btn" class="hidden" onclick="nextQuestion()">Next Question ➔</button>
        </div>
    </div>

    <div id="result-screen" class="hidden">
        <h2>Module Complete!</h2>
        <div class="score-display" style="font-size: 2.5em; text-align: center; margin: 20px 0; color: var(--primary); font-weight: bold;">
            <span id="final-score">0</span> / <span id="max-score">25</span>
        </div>
        <p id="result-message" style="text-align: center; font-size: 1.2em; margin-bottom: 30px;"></p>
        <div class="menu-grid">
            <button onclick="retryQuiz()">Retry Module</button>
            <button onclick="showMenu()" style="background: #64748b;">Back to Main Menu</button>
        </div>
    </div>
</div>

    let currentModule = 0;
    let currentQuestionIndex = 0;
    let score = 0;
    let answered = false;

    function showMenu() {
        document.getElementById('menu-screen').classList.remove('hidden');
        document.getElementById('quiz-screen').classList.add('hidden');
        document.getElementById('result-screen').classList.add('hidden');
    }

    function startQuiz(index) {
        currentModule = index;
        currentQuestionIndex = 0;
        score = 0;
        document.getElementById('menu-screen').classList.add('hidden');
        document.getElementById('quiz-screen').classList.remove('hidden');
        loadQuestion();
    }

    function loadQuestion() {
        const module = quizData[currentModule];
        const q = module.questions[currentQuestionIndex];
        const total = module.questions.length;
        
        answered = false;
        document.getElementById('module-title').innerText = module.title;
        document.getElementById('q-current').innerText = currentQuestionIndex + 1;
        document.getElementById('q-total').innerText = total;
        document.getElementById('running-score').innerText = score;
        
        // Update Progress Bar
        const progressPercent = ((currentQuestionIndex) / total) * 100;
        document.getElementById('progress-fill').style.width = `${progressPercent}%`;

        document.getElementById('question-text').innerText = `${currentQuestionIndex + 1}. ${q.q}`;
        document.getElementById('feedback').classList.add('hidden');
        document.getElementById('next-btn').classList.add('hidden');

        const container = document.getElementById('options-container');
        container.innerHTML = '';

        // Shuffle options slightly for better studying
        let shuffledOptions = [...q.options].sort(() => Math.random() - 0.5);

        shuffledOptions.forEach(opt => {
            const btn = document.createElement('button');
            btn.className = 'option-btn';
            btn.innerText = opt;
            btn.onclick = () => checkAnswer(opt, btn, q.a);
            container.appendChild(btn);
        });
    }

    function checkAnswer(selected, btn, correct) {
        if (answered) return;
        answered = true;
        
        const feedback = document.getElementById('feedback');
        feedback.classList.remove('hidden');

        // Highlight correct answer no matter what they clicked
        const allBtns = document.querySelectorAll('.option-btn');
        allBtns.forEach(b => {
            if(b.innerText === correct) {
                b.classList.add('correct');
            }
            b.style.pointerEvents = 'none'; // Disable further clicking
        });

        if (selected === correct) {
            score++;
            document.getElementById('running-score').innerText = score;
            feedback.innerText = "✅ Correct!";
            feedback.style.backgroundColor = "#dcfce7";
            feedback.style.color = "#166534";
        } else {
            btn.classList.add('wrong');
            feedback.innerText = `❌ Incorrect. The correct answer is: ${correct}`;
            feedback.style.backgroundColor = "#fee2e2";
            feedback.style.color = "#991b1b";
        }
        
        // Update Progress Bar to include current answered question
        const total = quizData[currentModule].questions.length;
        const progressPercent = ((currentQuestionIndex + 1) / total) * 100;
        document.getElementById('progress-fill').style.width = `${progressPercent}%`;

        // Change button text if it's the last question
        const nextBtn = document.getElementById('next-btn');
        if(currentQuestionIndex === total - 1) {
            nextBtn.innerText = "Finish Quiz ➔";
        } else {
            nextBtn.innerText = "Next Question ➔";
        }
        nextBtn.classList.remove('hidden');
    }

    function nextQuestion() {
        currentQuestionIndex++;
        if (currentQuestionIndex < quizData[currentModule].questions.length) {
            loadQuestion();
        } else {
            showResults();
        }
    }

    function showResults() {
        document.getElementById('quiz-screen').classList.add('hidden');
        document.getElementById('result-screen').classList.remove('hidden');
        
        const total = quizData[currentModule].questions.length;
        document.getElementById('final-score').innerText = score;
        document.getElementById('max-score').innerText = total;

        const message = document.getElementById('result-message');
        const percentage = (score / total) * 100;

        if(percentage >= 90) message.innerText = "Excellent work! You've mastered this module.";
        else if(percentage >= 70) message.innerText = "Great job! Just a little more review needed.";
        else if(percentage >= 50) message.innerText = "Good effort. Review the concepts and try again.";
        else message.innerText = "Keep studying! You'll get it next time.";
    }

    function retryQuiz() {
        startQuiz(currentModule);
    }
</script>

</body>
</html>
