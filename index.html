<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Study Dashboard</title>
    <style>
        :root {
            --bg: #0f172a;
            --card-bg: #1e293b;
            --text-main: #f8fafc;
            --text-muted: #94a3b8;
            --accent-1: #3b82f6; /* Blue for CC326 */
            --accent-2: #10b981; /* Green for IT PROF EL 3 */
            --accent-3: #8b5cf6; /* Purple for IT PROF EL 4 */
            --accent-4: #f59e0b; /* Orange */
            --accent-5: #ec4899; /* Pink */
            --accent-6: #06b6d4; /* Cyan */
        }

        body {
            font-family: 'Segoe UI', system-ui, sans-serif;
            background-color: var(--bg);
            color: var(--text-main);
            margin: 0;
            padding: 40px 20px;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .header {
            text-align: center;
            margin-bottom: 50px;
        }

        .header h1 {
            font-size: 2.5rem;
            margin: 0 0 10px 0;
            background: linear-gradient(to right, #38bdf8, #818cf8);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .header p {
            color: var(--text-muted);
            font-size: 1.1rem;
            margin: 0;
        }

        .grid-container {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
            gap: 25px;
            width: 100%;
            max-width: 1000px;
        }

        .subject-card {
            background: var(--card-bg);
            border-radius: 16px;
            padding: 30px 25px;
            text-decoration: none;
            color: var(--text-main);
            display: flex;
            flex-direction: column;
            align-items: center;
            text-align: center;
            transition: all 0.3s ease;
            border: 1px solid #334155;
            position: relative;
            overflow: hidden;
        }

        .subject-card::before {
            content: "";
            position: absolute;
            top: 0; left: 0; right: 0;
            height: 4px;
            background: var(--accent-color, #fff);
        }

        .subject-card:hover {
            transform: translateY(-8px);
            box-shadow: 0 15px 30px rgba(0, 0, 0, 0.4);
            border-color: #475569;
            background: #273549;
        }

        .icon {
            font-size: 2.5rem;
            margin-bottom: 15px;
        }

        .title {
            font-size: 1.4rem;
            font-weight: bold;
            margin-bottom: 8px;
            letter-spacing: 1px;
        }

        .subtitle {
            font-size: 0.9rem;
            color: var(--text-muted);
        }

        /* Specific Card Accents */
        .card-cc326 { --accent-color: var(--accent-1); }
        .card-ias321 { --accent-color: var(--accent-6); }
        .card-itprof3 { --accent-color: var(--accent-2); }
        .card-sp321 { --accent-color: var(--accent-4); }
        .card-itelect4 { --accent-color: var(--accent-5); }
        .card-itprof4 { --accent-color: var(--accent-3); }

    </style>
</head>
<body>

    <div class="header">
        <h1>Midterm Study Hub</h1>
        <p>Select a subject to initialize your reviewer module.</p>
    </div>

    <div class="grid-container">
        
        <a href="cc326.html" class="subject-card card-cc326">
            <div class="icon">💻</div>
            <div class="title">CC326</div>
            <div class="subtitle">App Dev & Software Engineering</div>
        </a>

        <a href="itprofel3.html" class="subject-card card-itprof3">
            <div class="icon">🌐</div>
            <div class="title">IT PROF EL 3</div>
            <div class="subtitle">Client-Server Computing</div>
        </a>

        <a href="itprofel4.html" class="subject-card card-itprof4">
            <div class="icon">📊</div>
            <div class="title">IT PROF EL 4</div>
            <div class="subtitle">UML & Software Modeling</div>
        </a>

        <a href="#" class="subject-card card-ias321">
            <div class="icon">🛡️</div>
            <div class="title">IAS 321</div>
            <div class="subtitle">Module Pending...</div>
        </a>

        <a href="#" class="subject-card card-sp321">
            <div class="icon">⚙️</div>
            <div class="title">SP 321</div>
            <div class="subtitle">Module Pending...</div>
        </a>

        <a href="ITELECTV4.html" class="subject-card card-itelect4">
            <div class="icon">⚡</div>
            <div class="title">IT ELECTV 4</div>
            <div class="subtitle">Module Pending...</div>
        </a>

    </div>

</body>
</html>
