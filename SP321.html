<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SP321: 100-Item Comprehensive Reviewer</title>
    <style>
        :root {
            --primary: #0f172a;
            --accent: #3b82f6;
            --success: #16a34a;
            --error: #dc2626;
            --bg: #f8fafc;
            --card: #ffffff;
            --text-muted: #64748b;
        }

        body {
            font-family: 'Segoe UI', system-ui, sans-serif;
            background-color: var(--bg);
            color: var(--primary);
            margin: 0;
            padding: 20px;
            display: flex;
            justify-content: center;
        }

        .container {
            width: 100%;
            max-width: 850px;
            background: var(--card);
            padding: 30px;
            border-radius: 12px;
            box-shadow: 0 10px 15px -3px rgb(0 0 0 / 0.1);
        }

        h1, h2 { text-align: center; color: var(--primary); }
        .subtitle { text-align: center; color: var(--text-muted); margin-bottom: 30px; }
        
        .hidden { display: none !important; }

        .menu-grid {
            display: grid;
            gap: 15px;
            margin-top: 20px;
        }

        button {
            padding: 15px 20px;
            font-size: 16px;
            font-weight: 500;
            cursor: pointer;
            border: none;
            border-radius: 8px;
            transition: all 0.2s;
            background: var(--accent);
            color: white;
        }

        button:hover { background: #2563eb; transform: translateY(-1px); }
        .btn-secondary { background: var(--text-muted); }
        .btn-secondary:hover { background: #475569; }

        .progress-container {
            width: 100%;
            height: 8px;
            background: #e2e8f0;
            border-radius: 4px;
            margin-bottom: 20px;
            overflow: hidden;
        }

        .progress-bar {
            height: 100%;
            background: var(--accent);
            width: 0%;
            transition: width 0.3s ease;
        }

        .stats {
            display: flex;
            justify-content: space-between;
            font-weight: bold;
            color: var(--text-muted);
            margin-bottom: 20px;
            padding-bottom: 15px;
            border-bottom: 2px solid #e2e8f0;
        }

        .question-text {
            font-size: 1.25rem;
            margin-bottom: 25px;
            font-weight: 600;
            line-height: 1.5;
        }

        .option-btn {
            display: block;
            width: 100%;
            text-align: left;
            background: #f1f5f9;
            color: var(--primary);
            border: 2px solid transparent;
            margin-bottom: 12px;
        }

        .option-btn:hover:not(:disabled) { background: #e2e8f0; }
        .option-btn:disabled { cursor: default; }

        .option-btn.correct { background: #dcfce7 !important; border-color: var(--success); color: #14532d; }
        .option-btn.wrong { background: #fee2e2 !important; border-color: var(--error); color: #7f1d1d; }

        .feedback {
            margin: 20px 0;
            padding: 15px;
            border-radius: 8px;
            text-align: center;
            font-weight: bold;
            font-size: 1.1rem;
        }

        .nav-controls {
            display: flex;
            justify-content: space-between;
            margin-top: 25px;
            gap: 15px;
        }

        /* --- Mobile Responsiveness Adjustments --- */
        @media (max-width: 600px) {
            body {
                padding: 10px;
            }

            .container {
                padding: 20px 15px;
                border-radius: 8px;
            }

            h1 { font-size: 1.5rem; }
            h2 { font-size: 1.25rem; }
            .subtitle { font-size: 0.9rem; margin-bottom: 20px; }

            button {
                padding: 14px 15px; 
                font-size: 15px;
            }

            .stats {
                flex-direction: column;
                align-items: center;
                gap: 8px;
                font-size: 0.95rem;
                padding-bottom: 10px;
            }

            .question-text {
                font-size: 1.1rem;
                margin-bottom: 20px;
            }

            .nav-controls {
                flex-direction: column-reverse; /* Puts "Next" button on top for easier tapping */
            }

            .nav-controls button {
                width: 100%;
            }

            .score-display {
                font-size: 3rem !important; /* Scale down the final score text */
            }
        }
    </style>
</head>

<div class="container">

        </div>
        <p id="result-message" style="text-align: center; font-size: 1.2rem; margin-bottom: 30px; font-weight: bold;"></p>
        <div class="menu-grid">
            <button onclick="retryQuiz()">Retry Module</button>
            <button class="btn-secondary" onclick="showMenu()">Main Menu</button>
        </div>
    </div>
</div>

                { q: "Why is 'Historical Bias' dangerous in machine learning?", a: "Because training AI on past data will cause it to learn and replicate past societal inequalities.", options: ["Because historical data is usually deleted.", "Because training AI on past data will cause it to learn and replicate past societal inequalities.", "Because historical data is too small.", "Because AI cannot understand dates."] },
                { q: "What describes a 'Representation Gap'?", a: "When the training dataset severely underrepresents certain minority groups.", options: ["When the UI is not responsive on mobile.", "When the training dataset severely underrepresents certain minority groups.", "When the code is not commented.", "When the algorithm runs too fast."] },
                { q: "How does a 'Feedback Loop' worsen algorithmic bias?", a: "Biased predictions lead to biased actions, which generate more biased data to feed the AI.", options: ["It deletes the database automatically.", "Biased predictions lead to biased actions, which generate more biased data to feed the AI.", "It causes the CPU to overheat.", "It makes the AI self-aware."] },
                { q: "Which of the following is an 'Inclusion Strategy' during Data Preprocessing?", a: "Data Augmentation or Resampling to balance demographic representation.", options: ["Deleting data from minority groups.", "Data Augmentation or Resampling to balance demographic representation.", "Using only historical data.", "Ignoring data anomalies."] },
                { q: "If a facial recognition software only accurately identifies lighter-skinned individuals, it likely suffered from:", a: "A Representation Gap in its training data.", options: ["A Representation Gap in its training data.", "Too much processing power.", "A lack of proxy variables.", "Perfect algorithmic fairness."] },
                { q: "What is 'Algorithmic Transparency' or Explainable AI (XAI)?", a: "Designing AI so humans can understand exactly how and why it made a specific decision.", options: ["Making the code open-source.", "Designing AI so humans can understand exactly how and why it made a specific decision.", "Using clear variable names.", "Selling the algorithm to the public."] },
                { q: "What is the danger of a 'Black Box' algorithm in criminal justice or hiring?", a: "No one can verify if its decisions are based on illegal biases because the logic is hidden.", options: ["It costs too much money.", "It uses too much electricity.", "No one can verify if its decisions are based on illegal biases because the logic is hidden.", "It is too easy to hack."] },
                { q: "If an AI resume screener downgrades applicants who attended all-women's colleges, it is demonstrating:", a: "Gender Bias", options: ["Age Bias", "Gender Bias", "Confirmation Bias", "Technical Debt"] },
                { q: "What does it mean to 'Audit' an algorithm?", a: "Testing the system specifically to uncover hidden biases or unfair outcomes before and after deployment.", options: ["Checking the code for syntax errors.", "Testing the system specifically to uncover hidden biases or unfair outcomes before and after deployment.", "Calculating how much the software cost to build.", "Deleting old data."] },
                { q: "Confirmation Bias in AI design occurs when:", a: "Developers build systems that reflect and confirm their own subconscious beliefs and prejudices.", options: ["The AI confirms a user's password.", "Developers build systems that reflect and confirm their own subconscious beliefs and prejudices.", "The compiler confirms the code is clean.", "The system asks 'Are you sure?' before deleting a file."] },
                { q: "What is 'Demographic Parity' as a fairness metric?", a: "Ensuring the algorithm's positive outcome rate is equal across all demographic groups.", options: ["Ensuring the algorithm runs equally fast on all computers.", "Ensuring the algorithm's positive outcome rate is equal across all demographic groups.", "Ensuring the dataset has exactly 1 million rows.", "Ensuring the AI has a human name."] },
                { q: "Why might removing a column for 'Race' from a dataset NOT prevent racial bias?", a: "Because proxy variables (like neighborhood or income) can still lead the AI to deduce race.", options: ["Because AI can see through the screen.", "Because proxy variables (like neighborhood or income) can still lead the AI to deduce race.", "Because race isn't a real data point.", "Because removing columns corrupts the database."] },
                { q: "In predictive policing, why do minority neighborhoods often get over-policed by AI?", a: "Historical bias in arrest records creates a feedback loop directing more police to those areas.", options: ["The AI physically forces police to go there.", "Historical bias in arrest records creates a feedback loop directing more police to those areas.", "The AI is programmed to hate specific streets.", "The AI uses GPS to find traffic jams."] },
                { q: "Which group is most responsible for preventing Algorithmic Bias?", a: "The data scientists and developers designing the system.", options: ["The end-users.", "The data scientists and developers designing the system.", "The marketing department.", "The hardware manufacturers."] },
                { q: "What is 'Data Sanitization' in the context of fairness?", a: "Removing or adjusting biased data points before the AI trains on them.", options: ["Wiping a hard drive completely.", "Removing or adjusting biased data points before the AI trains on them.", "Cleaning the physical servers.", "Encrypting passwords."] },
                { q: "What is a 'False Positive' in the context of an AI fraud detection system?", a: "A legitimate transaction incorrectly flagged as fraudulent.", options: ["A legitimate transaction incorrectly flagged as fraudulent.", "A fraudulent transaction that goes undetected.", "A successful login.", "A system crash."] },
                { q: "If a loan approval AI has a much higher 'False Positive' rejection rate for minorities, the system is:", a: "Unfair and disproportionately harming a protected class.", options: ["Working perfectly as designed.", "Unfair and disproportionately harming a protected class.", "Lacking a user interface.", "Only doing what the government wants."] },
                { q: "What does 'Human-in-the-Loop' (HITL) mean in AI deployment?", a: "Requiring a human to review and approve the AI's high-stakes decisions.", options: ["The AI controls the human.", "Requiring a human to review and approve the AI's high-stakes decisions.", "The AI is placed inside a robot.", "A human manually types all the data."] },
                { q: "What is 'Selection Bias'?", a: "When the data collected is not fully randomized and doesn't represent the true population.", options: ["When the user selects the wrong button.", "When the data collected is not fully randomized and doesn't represent the true population.", "When the AI selects the fastest processing route.", "When an employer selects the best candidate."] },
                { q: "Why are healthcare algorithms susceptible to bias?", a: "They may use healthcare cost as a proxy for health needs, disadvantaging poorer patients.", options: ["Doctors don't know how to use computers.", "They may use healthcare cost as a proxy for health needs, disadvantaging poorer patients.", "Hospitals don't have enough data.", "Medical data cannot be digitized."] },
                { q: "To ensure an AI is fair, development teams should be:", a: "Diverse and multidisciplinary.", options: ["Made entirely of programmers.", "Diverse and multidisciplinary.", "Composed of only managers.", "Outsourced to the cheapest bidder."] },
                { q: "If an AI model works fairly in testing but exhibits bias after a year in production, what is required?", a: "Continuous monitoring and retraining (Model Maintenance).", options: ["Nothing, the test phase was enough.", "Continuous monitoring and retraining (Model Maintenance).", "Firing the original developers.", "Shutting down the company."] },
                { q: "Which ethical framework would argue that algorithmic bias is wrong because it systematically violates the duty of equal respect for all persons?", a: "Deontology", options: ["Utilitarianism", "Virtue Ethics", "Deontology", "Egoism"] }
            ]
        }
    ];

    let currentModule = 0;
    let currentQuestion = 0;
    let score = 0;
    let answered = false;

    function showMenu() {
        document.getElementById('menu-screen').classList.remove('hidden');
        document.getElementById('quiz-screen').classList.add('hidden');
        document.getElementById('results-screen').classList.add('hidden');
    }

    function startQuiz(index) {
        currentModule = index;
        currentQuestion = 0;
        score = 0;
        
        document.getElementById('menu-screen').classList.add('hidden');
        document.getElementById('results-screen').classList.add('hidden');
        document.getElementById('quiz-screen').classList.remove('hidden');
        
        loadQuestion();
    }

    function loadQuestion() {
        answered = false;
        const module = quizData[currentModule];
        const qData = module.questions[currentQuestion];
        
        document.getElementById('module-title').innerText = module.title;
        document.getElementById('q-current').innerText = currentQuestion + 1;
        document.getElementById('current-score').innerText = score;
        
        const progress = (currentQuestion / 25) * 100;
        document.getElementById('progress-bar').style.width = `${progress}%`;

        document.getElementById('question-text').innerText = `${currentQuestion + 1}. ${qData.q}`;
        
        const container = document.getElementById('options-container');
        container.innerHTML = '';
        
        const shuffled = [...qData.options].sort(() => Math.random() - 0.5);

        shuffled.forEach(opt => {
            const btn = document.createElement('button');
            btn.className = 'option-btn';
            btn.innerText = opt;
            btn.onclick = () => checkAnswer(btn, opt, qData.a);
            container.appendChild(btn);
        });

        document.getElementById('feedback').classList.add('hidden');
        document.getElementById('next-btn').classList.add('hidden');
    }

    function checkAnswer(btn, selected, correct) {
        if (answered) return;
        answered = true;

        const feedback = document.getElementById('feedback');
        feedback.classList.remove('hidden');

        const buttons = document.querySelectorAll('.option-btn');
        buttons.forEach(b => {
            b.disabled = true;
            if (b.innerText === correct) b.classList.add('correct');
        });

        if (selected === correct) {
            score++;
            document.getElementById('current-score').innerText = score;
            feedback.innerText = "✅ Correct!";
            feedback.style.backgroundColor = "#dcfce7";
            feedback.style.color = "#14532d";
        } else {
            btn.classList.add('wrong');
            feedback.innerText = `❌ Incorrect. The answer is highlighted above.`;
            feedback.style.backgroundColor = "#fee2e2";
            feedback.style.color = "#7f1d1d";
        }

        const progress = ((currentQuestion + 1) / 25) * 100;
        document.getElementById('progress-bar').style.width = `${progress}%`;

        const nextBtn = document.getElementById('next-btn');
        nextBtn.innerText = currentQuestion === 24 ? "Finish Module &rarr;" : "Next Question &rarr;";
        nextBtn.classList.remove('hidden');
    }

    function nextQuestion() {
        if (currentQuestion < 24) {
            currentQuestion++;
            loadQuestion();
        } else {
            showResults();
        }
    }

    function showResults() {
        document.getElementById('quiz-screen').classList.add('hidden');
        document.getElementById('results-screen').classList.remove('hidden');
        
        document.getElementById('final-score').innerText = score;
        
        const msg = document.getElementById('result-message');
        if (score >= 22) { msg.innerText = "Outstanding! You've mastered these concepts."; msg.style.color = "var(--success)"; }
        else if (score >= 17) { msg.innerText = "Great job! A solid understanding."; msg.style.color = "var(--accent)"; }
        else if (score >= 12) { msg.innerText = "Good effort, but review the material again."; msg.style.color = "#ca8a04"; }
        else { msg.innerText = "Keep studying! You'll get it next time."; msg.style.color = "var(--error)"; }
    }

    function retryQuiz() {
        startQuiz(currentModule);
    }
</script>
